name: Bug Report
description: Report a bug in an existing reusable workflow
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below to help us investigate.
        Before submitting, check the [documentation](https://radiorabe.github.io/actions/) and open issues to avoid duplicates.

  - type: dropdown
    id: workflow
    attributes:
      label: Affected Workflow
      description: Which reusable workflow is affected?
      options:
        - release-ansible-collection
        - release-container
        - release-mkdocs
        - release-python-poetry
        - schedule-trivy
        - semantic-release
        - test-ansible-collection
        - test-pre-commit
        - test-python-poetry
        - test-github-actions
        - Other / Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Workflow Version
      description: Which version tag are you using? (e.g. `v0.44.2`)
      placeholder: "v0.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Caller Workflow
      description: Paste the calling workflow YAML that reproduces the issue (replace secrets with placeholders).
      render: yaml

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, links to failed runs, or screenshots.

  - type: dropdown
    id: security-impact
    attributes:
      label: Security Impact
      description: Does this bug have a security dimension?
      options:
        - No security impact
        - Possible vulnerability or exposure (describe below)
        - Confirmed vulnerability — please also open a private Security Advisory
    validations:
      required: true

  - type: textarea
    id: security-detail
    attributes:
      label: Security Details (if applicable)
      description: |
        If this bug could be a security vulnerability, describe the potential impact.
        For confirmed vulnerabilities, open a
        [Security Advisory](https://github.com/radiorabe/actions/security/advisories/new)
        instead of, or in addition to, this issue.

  - type: checkboxes
    id: downstream-due-diligence
    attributes:
      label: Caller Due Diligence
      options:
        - label: I have checked whether caller repositories could be affected by this issue and included remediation notes for them
          required: true
        - label: Any caller workflows or container images are verified to be pinned/immutable, or their risk is documented
          required: true
