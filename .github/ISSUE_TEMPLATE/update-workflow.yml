name: Update Workflow
description: Request an update to an existing reusable workflow
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to request a change to an existing workflow — new inputs, tool version bumps, behavior changes, or security improvements.
        See the [Contributing guide](https://radiorabe.github.io/actions/contributing/) for the full workflow lifecycle.

  - type: dropdown
    id: workflow
    attributes:
      label: Workflow to Update
      description: Which reusable workflow should be changed?
      options:
        - release-ansible-collection
        - release-container
        - release-mkdocs
        - release-python-poetry
        - schedule-trivy
        - semantic-release
        - test-ansible-collection
        - test-pre-commit
        - test-python-poetry
        - test-github-actions
    validations:
      required: true

  - type: dropdown
    id: update-type
    attributes:
      label: Type of Update
      options:
        - New input / option
        - Tool or action version bump
        - Behavior change
        - Security improvement
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: Describe the current behavior of the workflow.
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: Desired Behavior
      description: Describe the desired behavior after the update.
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change?
      description: Would existing callers need to update their workflows?
      options:
        - "No"
        - "Yes – existing callers need to update their workflows"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Justification
      description: Why is this change needed? Link to upstream changelogs, CVEs, or related issues.

  - type: dropdown
    id: security-impact
    attributes:
      label: Security Impact
      description: Does this update have a security dimension?
      options:
        - No security impact
        - Adds or replaces a third-party action (supply chain impact)
        - Changes required permissions
        - Addresses a known vulnerability or CVE
        - Security improvement (hardens posture)
        - Other security impact (describe in motivation)
    validations:
      required: true

  - type: input
    id: enisa-control
    attributes:
      label: ENISA TA Control Affected (optional)
      description: |
        If this update addresses or affects a control from the
        [ENISA Technical Advisory for Secure Use of Package Managers](https://radiorabe.github.io/actions/security/),
        note the control ID (e.g. §4.2.3, §4.3.2).
      placeholder: "e.g. §4.2.3 Integrity Enforcement"

  - type: checkboxes
    id: security-due-diligence
    attributes:
      label: Security Due Diligence
      options:
        - label: Caller repositories are mapped and reviewed for immutable references (no unpinned workflows/images)
          required: true
        - label: Reusable components and vendor supply-chain impact is assessed for caller exposure
          required: false
