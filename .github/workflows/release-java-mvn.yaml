name: Release Java packages
on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        default: '21'
        type: string
      java-distribution:
        description: 'Java distribution to use, see https://github.com/actions/setup-java?tab=readme-ov-file#supported-distributions'
        required: false
        default: 'temurin'
        type: string
      path:
        description: 'Path to the directory containing pom.xml'
        required: false
        default: '.'
        type: string
      deploy:
        description: 'Deploy to GitHub Packages when true; otherwise run verify only'
        required: false
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Publish to GitHub Packages
        run: |
          if [ "${{ inputs.deploy }}" = 'true' ]; then
            mvn --batch-mode deploy
          else
            mvn --batch-mode verify
          fi
        working-directory: ${{ inputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
