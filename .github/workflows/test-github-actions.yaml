name: Test GitHub Actions

on:
  workflow_call:
    inputs:
      persona:
        description: "The auditing persona to use: 'regular' (default), 'pedantic', or 'auditor'."
        required: false
        type: string
        default: "regular"
      min-severity:
        description: "The minimum severity to report findings for: 'unknown', 'informational', 'low', 'medium', or 'high'."
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write # Required to create zizmor security alerts

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Select zizmor persona
        id: select-persona
        env:
          INPUT_PERSONA: ${{ inputs.persona }}
        run: |
          persona="regular"
          if [[ "${INPUT_PERSONA}" != "" ]]; then
             persona="${INPUT_PERSONA}"
          fi
          echo "persona=${persona}" >> $GITHUB_OUTPUT

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: ${{ steps.select-persona.outputs.persona }}
          min-severity: ${{ inputs.min-severity }}
