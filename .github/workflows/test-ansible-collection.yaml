name: Lint and Test

on:
  workflow_call:
    inputs:
      path:
        description: Specific path to lint instead of the default `.`.
        required: false
        type: string
        default: "."

permissions: {}

jobs:
  lint:
    name: Lint with ansible-lint and ruff
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install ruff
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0

      - name: Lint with ruff
        run: ruff check --diff ${INPUTS_PATH}
        env:
          INPUTS_PATH: ${{ inputs.path }}

      - name: Format with ruff
        run: ruff format --diff ${INPUTS_PATH}
        env:
          INPUTS_PATH: ${{ inputs.path }}

      - name: Lint with ansible-lint
        uses: ansible/ansible-lint@262624cd0ab22a4221293216856c59671ce7aa5e # v26.6.0
        with:
          setup_python: false
          working_directory: ${{ inputs.path }}
