name: Lint and Test

on:
  workflow_call:
    inputs:
      path:
        description: Specific path to lint instead of the default `.`.
        required: false
        type: string
        default: "."

permissions: {}

jobs:
  lint:
    name: Lint with ansible-lint and ruff
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0

      - name: Lint with flake8
        run: ruff check --diff ${INPUTS_PATH}
        env:
          INPUTS_PATH: ${{ inputs.path }}

      - name: Lint with black
        run: ruff format ${INPUTS_PATH}
        env:
          INPUTS_PATH: ${{ inputs.path }}

      - name: Lint with ansible-lint
        uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c # v26.4.0
        with:
          setup_python: false
          working_directory: ${{ inputs.path }}
