name: Release Ansible Collection
on:
  workflow_call:
    inputs:
      publish:
        description: "Enable publishing collection"
        default: true
        required: false
        type: boolean
      path:
        description: "Path to the collection root (directory containing galaxy.yml)"
        required: false
        default: "."
        type: string
    secrets:
      GALAXY_API_KEY:
        required: false

permissions: {}

jobs:
  build:
    name: Build and optionally publish Ansible collection
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install ansible>=2

      - name: Update version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          INPUTS_PATH: ${{ inputs.path }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i -e "s/version: 0.0.0/version: ${VERSION}/" "${INPUTS_PATH}/galaxy.yml"

      - name: Build collection
        env:
          INPUTS_PATH: ${{ inputs.path }}
        run: |
          ansible-galaxy collection build "${INPUTS_PATH}"

      - name: Publish collection
        if: inputs.publish
        run: |
          ansible-galaxy collection publish *.tar.gz --token "${GALAXY_API_KEY}"
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
