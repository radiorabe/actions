# Deprecated: use release-zensical.yaml instead.
# This workflow remains available for downstreams that have not yet migrated.
# See docs/workflows/mkdocs.md for migration guidance.
name: Release Mkdocs

on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  publish:
    name: Publish Mkdocs documentation to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write # for pushing gh-pages branch

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          # credentials are reused by the mdocs gh-deploy step for now
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install Mkdocs and plugins
        run: pip install "mkdocs<2.0" mkdocs-material mkdocs-gen-files mkdocs-literate-nav mkdocs-section-index mkdocs-autorefs 'mkdocstrings[python]' mkdocs-llmstxt

      - name: Build Mkdocs documentation
        run: mkdocs build

      - name: Deploy Mkdocs documentation
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: mkdocs gh-deploy
