name: Run Trivy

on:
  workflow_call:
    inputs:
      image-ref:
        description: "image-ref to scan"
        required: true
        type: string
      timeout:
        description: "Scan timeout duration"
        required: false
        default: "5m0s"
        type: string
      upload-sarif:
        description: "Upload Trivy scan results to the GitHub Security tab"
        required: false
        default: true
        type: boolean
      attest:
        description: "Attach a cosign vulnerability attestation to the scanned image"
        required: false
        default: true
        type: boolean

permissions: {}

jobs:
  trivy:
    name: Run Trivy vulnerability scanner
    runs-on: ubuntu-latest

    permissions:
      packages: write # allow pushing attestation to registry
      security-events: write # allow uploading sarif to security tab
      id-token: write # needed for signing the images with GitHub OIDC using cosign

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db
        with:
          image-ref: ${{ inputs.image-ref }}
          timeout: ${{ inputs.timeout }}
          format: "json"
          ignore-unfixed: true
          list-all-pkgs: true
          scanners: "vuln"
          output: "trivy.json"

      - name: Convert trivy results to sarif
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: trivy.json
          scan-type: "convert"
          format: "sarif"
          # we don't actually limit them, but this gates the convert action
          limit-severities-for-sarif: true
          # empty makes it skip the --vuln-type arg
          vuln-type: ""
          output: "trivy.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && inputs.upload-sarif
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: "trivy.sarif"

      - name: Convert trivy results to cosign-vuln
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: trivy.json
          scan-type: "convert"
          format: "cosign-vuln"
          # we don't actually limit them, but this gates the convert action
          limit-severities-for-sarif: true
          # empty makes it skip the --vuln-type arg
          vuln-type: ""
          output: "trivy.cosign.json"

      - name: Login to GitHub Container Registry
        if: inputs.attest
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach a security attestation to the signed image
        if: inputs.attest
        run: cosign attest --yes --type vuln --predicate trivy.cosign.json -- "${INPUTS_IMAGE_REF}"
        env:
          INPUTS_IMAGE_REF: ${{ inputs.image-ref }}
