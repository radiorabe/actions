name: Smoke Test Workflows

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  smoke-release-container:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/release-container.yaml
    with:
      image: ghcr.io/radiorabe/actions
      name: actions
      display-name: RaBe Actions
      tags: smoke-test
      cosign-verify: false
      dockerfile: test/Dockerfile

  smoke-pre-commit:
    permissions:
      contents: read
    uses: ./.github/workflows/test-pre-commit.yaml
    with:
      requirements: ""
