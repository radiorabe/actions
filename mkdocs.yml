site_name: RaBe GitHub Actions
site_url: https://radiorabe.github.io/actions/
repo_url: https://github.com/radiorabe/actions
repo_name: radiorabe/actions

theme:
  name: "material"
  custom_dir: docs/overrides
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: '#00c9bf'
      accent: '#00c9bf'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: '#00c9bf'
      accent: '#00c9bf'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/radio
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

markdown_extensions:
- admonition
- attr_list
- md_in_html
- toc:
    permalink: true
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences

extra_css:
- css/style.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/radiorabe/actions
      name: GitHub
  generator: false

plugins:
- search
- section-index
- llmstxt:
    markdown_description: |
      Reusable GitHub Actions workflows for Radio Bern RaBe CI/CD pipelines.
      Covers container image releases, Python/Poetry testing and publishing,
      Ansible collection releases, MkDocs documentation deployment, pre-commit
      checks, Trivy security scanning, and semantic versioning.
    sections:
      Workflows:
        - workflows/index.md
        - workflows/ansible/*.md
        - workflows/container/*.md
        - workflows/python/*.md
        - workflows/pre-commit.md
        - workflows/mkdocs.md
        - workflows/semantic-release.md
      Reference:
        - getting-started.md
        - permissions.md
        - contributing.md

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Workflows:
    - workflows/index.md
    - Ansible Collections:
      - workflows/ansible/index.md
      - Release: workflows/ansible/release.md
      - Test: workflows/ansible/test.md
    - Container Images:
      - workflows/container/index.md
      - Release: workflows/container/release.md
      - Schedule: workflows/container/schedule.md
    - Python:
      - workflows/python/index.md
      - Test: workflows/python/test.md
      - Release: workflows/python/release.md
    - Pre-Commit: workflows/pre-commit.md
    - MkDocs: workflows/mkdocs.md
    - Semantic Release: workflows/semantic-release.md
  - Permissions: permissions.md
  - Contributing: contributing.md
